# IAM Roles for Service Accounts (IRSA) - gives the backend pod S3 access without static keys.
# Steps before applying:
#   1. Create an IAM role with S3 permissions for the legalops-documents-prod bucket.
#   2. Add trust relationship for EKS OIDC provider.
#   3. Replace REPLACE_WITH_IAM_ROLE_ARN below with the actual ARN.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: legalops-backend-sa
  namespace: legalops
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_IAM_ROLE_ARN
