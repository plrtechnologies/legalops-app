apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: legalops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: legalops-backend-sa   # enables IRSA for S3
      containers:
        - name: backend
          image: REPLACE_WITH_ECR_REPO/legalops-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: legalops-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: JWT_REFRESH_SECRET
            - name: SARVAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: SARVAM_API_KEY
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: legalops
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
