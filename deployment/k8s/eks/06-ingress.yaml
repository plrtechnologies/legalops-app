# AWS Load Balancer Controller must be installed on the EKS cluster.
# Replace REPLACE_WITH_ACM_ARN with your ACM SSL certificate ARN.
# Replace REPLACE_WITH_YOUR_DOMAIN with your actual domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legalops-ingress
  namespace: legalops
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_ARN
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120
spec:
  rules:
    - host: REPLACE_WITH_YOUR_DOMAIN
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak-svc
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
