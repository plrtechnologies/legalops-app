apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: legalops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: legalops-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: legalops-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: JWT_REFRESH_SECRET
            - name: SARVAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: legalops-secrets
                  key: SARVAM_API_KEY
          volumeMounts:
            - name: documents
              mountPath: /mnt/documents
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: legalops-documents-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: legalops
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
